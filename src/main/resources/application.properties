spring.application.name=preguntas

server.port=8080

# Hilos virtuales (Java 21): cada peticion bloqueante (p. ej. la llamada a
# Google STT) usa un hilo virtual en vez de un hilo de plataforma. Un hilo
# de plataforma reserva ~1MB de stack aunque este esperando una respuesta de
# red; los hilos virtuales son mucho mas baratos en memoria, por lo que el
# servicio puede atender mas peticiones concurrentes con la misma RAM.
spring.threads.virtual.enabled=true

